[package]
name = "docs-rs-mcp"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.102"
axum = { version = "0.8.9", features = ["macros"] }
rmcp = { version = "1.7.0", features = [
    "auth",
    "client",
    "elicitation",
    "macros",
    "schemars",
    "server",
    "transport-io",
    "transport-streamable-http-server",
] }
serde = "1.0.228"
serde_json = "1.0.150"
tokio = { version = "1.52.3", features = ["full"] }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }
